services:
  # Banco de Dados da Aplicação
  app_db:
    image: postgres:17
    container_name: nexosCoreDB
    environment:
      POSTGRES_USER: nexosCore
      POSTGRES_PASSWORD: nexos123
      POSTGRES_DB: nexosCore
    ports:
      - "5434:5432"
    volumes:
      - nexos_app_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexosCore -d nexosCore"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: always

  # Banco de Dados do SonarQube
  sonar_db:
    image: postgres:17
    container_name: nexosCoreSonarDB
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar123
      POSTGRES_DB: sonar
    # Porta 5433 para evitar conflito com o banco da aplicação no seu localhost
    ports:
      - "5433:5432"
    volumes:
      - nexos_sonar_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonar -d sonar"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: always

  # Aplicação SonarQube
  sonarqube:
    image: sonarqube:community
    container_name: nexosCoreSonar
    depends_on:
      sonar_db:
        condition: service_healthy
    ports:
      - "9000:9000"
    environment:
      - SONAR_JDBC_URL=jdbc:postgresql://sonar_db:5432/sonar
      - SONAR_JDBC_USERNAME=sonar
      - SONAR_JDBC_PASSWORD=sonar123
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    restart: always

volumes:
  nexos_app_db_data:
  nexos_sonar_db_data:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
